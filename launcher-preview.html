<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyx2 Preview</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Segoe UI, Arial, sans-serif;
        background: #08101a;
        color: white;
    }

    .slider {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 18px;
        background: linear-gradient(180deg, #0b1320 0%, #08101a 100%);
    }

    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
        background-size: cover;
        background-position: center;
    }

    .slide.active {
        opacity: 1;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background:
            linear-gradient(90deg, rgba(5,10,18,0.88) 0%, rgba(5,10,18,0.45) 45%, rgba(5,10,18,0.18) 100%),
            linear-gradient(180deg, rgba(8,14,22,0.12) 0%, rgba(8,14,22,0.58) 100%);
    }

    .content {
        position: absolute;
        left: 48px;
        top: 48px;
        max-width: 520px;
        z-index: 2;
    }

    .tag {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid rgba(95, 155, 255, 0.45);
        border-radius: 999px;
        color: #85b7ff;
        background: rgba(12, 20, 34, 0.72);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 18px;
    }

    h1 {
        font-size: 40px;
        line-height: 1.05;
        margin-bottom: 14px;
        text-shadow: 0 3px 18px rgba(0,0,0,0.35);
    }

    p {
        font-size: 16px;
        line-height: 1.6;
        color: #d7e3f5;
        margin-bottom: 20px;
    }

    .cta-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
        transform: translateY(-1px);
        opacity: 0.95;
    }

    .btn-primary {
        background: linear-gradient(180deg, #4c95ff 0%, #2f74e8 100%);
        color: white;
        box-shadow: 0 10px 24px rgba(52, 112, 220, 0.32);
    }

    .btn-secondary {
        background: rgba(15, 22, 35, 0.82);
        color: #e8f1ff;
        border: 1px solid rgba(101, 136, 190, 0.35);
    }

    .dots {
        position: absolute;
        left: 48px;
        bottom: 34px;
        display: flex;
        gap: 10px;
        z-index: 3;
    }

    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255,255,255,0.22);
        border: 1px solid rgba(255,255,255,0.18);
        cursor: pointer;
    }

    .dot.active {
        background: #4c95ff;
        box-shadow: 0 0 0 5px rgba(76,149,255,0.14);
    }
</style>
</head>
<body>
<div class="slider">
    <div class="slide active" style="background-image:url('assets/slide1.jpg');"></div>
    <div class="slide" style="background-image:url('assets/slide2.jpg');"></div>
    <div class="slide" style="background-image:url('assets/slide3.jpg');"></div>

    <div class="overlay"></div>

    <div class="content">
        <div class="tag">NYX2 OFFICIAL</div>
        <h1 id="title">ENTER THE WORLD OF NYX2</h1>
        <p id="desc">Fast patching, stable launcher flow and instant client access.</p>

        <div class="cta-row">
            <a class="btn btn-primary" href="https://nyx2.hitsukaya.com/account">Account</a>
            <a class="btn btn-secondary" href="https://discord.gg/yourserver">Community</a>
        </div>
    </div>

    <div class="dots" id="dots"></div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    const dotsWrap = document.getElementById('dots');
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');

    const data = [
        {
            title: 'ENTER THE WORLD OF NYX2',
            desc: 'Fast patching, stable launcher flow and instant client access.'
        },
        {
            title: 'EVENTS, NEWS AND UPDATES',
            desc: 'Keep players informed with seasonal updates, announcements and server activity.'
        },
        {
            title: 'JOIN THE COMMUNITY',
            desc: 'Connect with other players, get support and stay close to everything happening in Nyx2.'
        }
    ];

    let current = 0;

    function renderDots() {
        dotsWrap.innerHTML = '';
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === current ? ' active' : '');
            dot.addEventListener('click', () => showSlide(i));
            dotsWrap.appendChild(dot);
        });
    }

    function showSlide(index) {
        slides[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
        title.textContent = data[current].title;
        desc.textContent = data[current].desc;
        renderDots();
    }

    function nextSlide() {
        showSlide((current + 1) % slides.length);
    }

    renderDots();
    setInterval(nextSlide, 5000);
</script>
</body>
</html>
